<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CardVault · 名片管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222222;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #f0ede8;
  --text2: #a09a92;
  --text3: #5c5652;
  --accent: #c8a97e;
  --accent2: #e8c99e;
  --danger: #d46060;
  --success: #6db88a;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; }
h1, h2, h3 { font-family: 'DM Serif Display', serif; font-weight: 400; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Screens ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ══════════════ TOPBAR ══════════════ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-user { font-size: 13px; color: var(--text2); }
.topbar-btn {
  padding: 6px 14px;
  background: transparent; border: 0.5px solid var(--border2);
  border-radius: 99px; color: var(--text2);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.topbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.topbar-btn.accent {
  background: var(--accent); color: #1a1209;
  border-color: var(--accent); font-weight: 600;
}
.topbar-btn.accent:hover { background: var(--accent2); }
.lang-toggle { font-size: 12px; }

/* ══════════════ TAB NAV ══════════════ */
.tab-nav {
  display: flex; gap: 0;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 0.75rem 0.5rem;
  background: transparent; border: none;
  color: var(--text3); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--text); }

/* ══════════════ MAIN CONTENT ══════════════ */
.main-content { flex: 1; overflow-y: auto; padding: 1.25rem; }

/* ══════════════ SCAN TAB ══════════════ */
.scan-area {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 2rem 1.5rem;
  text-align: center;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.scan-area:hover { border-color: var(--accent); background: rgba(200,169,126,0.03); }
.scan-area.drag-over { border-color: var(--accent); background: rgba(200,169,126,0.06); }
.scan-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.scan-area h3 { color: var(--text); font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
.scan-area p { color: var(--text2); font-size: 13px; }
#file-input { display: none; }
.scan-preview {
  margin-top: 1rem; border-radius: var(--radius-sm);
  overflow: hidden; max-height: 220px;
}
.scan-preview img { width: 100%; object-fit: contain; max-height: 220px; display: block; }

.api-key-section {
  margin-top: 1.25rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
}
.api-key-section label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.api-key-row { display: flex; gap: 8px; }
.api-key-row input {
  flex: 1; padding: 0.6rem 0.9rem;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: 'DM Mono', monospace;
  outline: none;
}
.api-key-row input:focus { border-color: var(--accent); }
.api-key-row button {
  padding: 0.6rem 1rem;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text2);
  font-size: 13px; cursor: pointer; white-space: nowrap;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.api-key-row button:hover { border-color: var(--accent); color: var(--accent); }

.result-card {
  margin-top: 1.25rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.3s ease;
}
.result-card-header {
  padding: 1rem 1.25rem;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.result-card-header h3 { font-size: 1rem; color: var(--text); }
.result-body { padding: 1rem 1.25rem; }
.field-row { margin-bottom: 0.85rem; }
.field-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.field-input {
  width: 100%; padding: 0.6rem 0.9rem;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--accent); }
textarea.field-input { resize: vertical; min-height: 70px; }
select.field-input { cursor: pointer; }
.save-btn {
  width: 100%; margin-top: 0.5rem; padding: 0.85rem;
  background: var(--accent); color: #1a1209;
  border: none; border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.save-btn:hover { background: var(--accent2); }
.save-btn:active { transform: scale(0.98); }
.status-bar {
  margin-top: 1rem; padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 13px; text-align: center; display: none;
}
.status-bar.loading { background: rgba(200,169,126,0.1); color: var(--accent); border: 0.5px solid rgba(200,169,126,0.2); display: block; }
.status-bar.success { background: rgba(109,184,138,0.1); color: var(--success); border: 0.5px solid rgba(109,184,138,0.2); display: block; }
.status-bar.error { background: rgba(212,96,96,0.1); color: var(--danger); border: 0.5px solid rgba(212,96,96,0.2); display: block; }

/* ══════════════ BROWSE TAB ══════════════ */
.search-bar {
  display: flex; gap: 8px; margin-bottom: 1rem;
}
.search-input {
  flex: 1; padding: 0.65rem 1rem;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-select {
  padding: 0.65rem 0.8rem;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer;
}
.country-group { margin-bottom: 1.5rem; }
.country-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 0.5px solid var(--border);
}
.country-flag { font-size: 1.4rem; }
.country-name { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: var(--text); }
.country-count { font-size: 12px; color: var(--text3); margin-left: auto; }
.cards-grid { display: flex; flex-direction: column; gap: 8px; }
.contact-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  cursor: pointer; transition: all 0.2s;
  position: relative;
}
.contact-card:hover { border-color: var(--border2); background: var(--surface2); }
.contact-card-name { font-weight: 500; font-size: 15px; color: var(--text); margin-bottom: 3px; }
.contact-card-title { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.contact-card-company { font-size: 13px; color: var(--accent); }
.contact-card-meta { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
.contact-meta-item { font-size: 12px; color: var(--text3); }
.contact-card-actions { display: flex; gap: 6px; margin-top: 10px; }
.action-btn {
  padding: 5px 12px;
  background: transparent; border: 0.5px solid var(--border2);
  border-radius: 99px; color: var(--text2);
  font-size: 12px; cursor: pointer; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); }
.action-btn.del { }
.action-btn.del:hover { border-color: var(--danger); color: var(--danger); }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text3); }
.empty-state p { margin-top: 1rem; font-size: 14px; }
.export-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.export-btn {
  flex: 1; padding: 0.6rem;
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text2);
  font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); }
.stats-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.stat-pill {
  flex: 1; padding: 0.6rem 0.75rem;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); text-align: center;
}
.stat-num { font-size: 1.3rem; font-weight: 600; color: var(--accent); font-family: 'DM Serif Display', serif; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ══════════════ DETAIL MODAL ══════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  width: 100%; max-width: 480px;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 1.5rem 1.25rem;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
.modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 1.25rem; }
.modal-name { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--text); margin-bottom: 4px; }
.modal-title { font-size: 14px; color: var(--text2); margin-bottom: 4px; }
.modal-company { font-size: 14px; color: var(--accent); margin-bottom: 1.25rem; }
.modal-field { margin-bottom: 0.75rem; display: flex; gap: 10px; align-items: flex-start; }
.modal-field-icon { color: var(--text3); font-size: 1rem; margin-top: 2px; flex-shrink: 0; width: 18px; text-align: center; }
.modal-field-content {}
.modal-field-label { font-size: 11px; color: var(--text3); }
.modal-field-value { font-size: 14px; color: var(--text); word-break: break-all; }
.modal-notes-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.75rem; margin-top: 0.25rem; font-size: 14px; color: var(--text2); white-space: pre-wrap; }
.modal-close {
  width: 100%; margin-top: 1.25rem; padding: 0.75rem;
  background: var(--surface2); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text2);
  font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.modal-close:hover { color: var(--text); }

/* ══════════════ SETTINGS TAB ══════════════ */
.settings-section { margin-bottom: 1.5rem; }
.settings-section-title { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
.settings-item {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 0.9rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
}
.settings-item-left {}
.settings-item-label { font-size: 14px; color: var(--text); }
.settings-item-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }
.settings-item-right { color: var(--text2); font-size: 13px; }
.danger-btn {
  width: 100%; padding: 0.8rem;
  background: transparent; border: 0.5px solid var(--danger);
  border-radius: var(--radius-sm); color: var(--danger);
  font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.danger-btn:hover { background: rgba(212,96,96,0.1); }

/* ══════════════ ANIMATIONS ══════════════ */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(200,169,126,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════ IMAGE PREVIEW IN SCAN ══════════════ */
.card-img-preview {
  width: 100%; border-radius: var(--radius-sm);
  max-height: 180px; object-fit: contain; display: block;
  background: var(--surface2);
}
.country-badge {
  display: inline-block; padding: 2px 8px;
  background: rgba(200,169,126,0.1); color: var(--accent);
  border-radius: 99px; font-size: 11px;
  border: 0.5px solid rgba(200,169,126,0.2);
  margin-left: 6px; vertical-align: middle;
}
</style>
</head>
<body>

<!-- ══════════ APP SCREEN ══════════ -->
<div id="screen-app" class="screen active">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">CardVault</div>
    <div class="topbar-right">
      <button class="topbar-btn lang-toggle" onclick="toggleLang()" id="lang-btn">EN</button>
    </div>
  </div>

  <!-- Tab Nav -->
  <div class="tab-nav">
    <button class="tab-btn active" id="tab-scan-btn" onclick="switchTab('scan')">
      <span>📷</span> <span data-i18n="tab_scan">掃描</span>
    </button>
    <button class="tab-btn" id="tab-browse-btn" onclick="switchTab('browse')">
      <span>📋</span> <span data-i18n="tab_browse">瀏覽</span>
    </button>
    <button class="tab-btn" id="tab-settings-btn" onclick="switchTab('settings')">
      <span>⚙️</span> <span data-i18n="tab_settings">設定</span>
    </button>
  </div>

  <!-- SCAN TAB -->
  <div id="tab-scan" class="main-content">
    <!-- API Key -->
    <div class="api-key-section">
      <label data-i18n="api_key_label">Claude API 金鑰</label>
      <div class="api-key-row">
        <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
        <button onclick="saveApiKey()" data-i18n="save">儲存</button>
      </div>
      <div style="font-size:12px; color:var(--text3); margin-top:6px;" data-i18n="api_key_hint">金鑰存在您的瀏覽器，不會上傳至任何伺服器</div>
    </div>

    <!-- Scan Area -->
    <div class="scan-area" id="scan-area" onclick="document.getElementById('file-input').click()" style="margin-top:1rem;"
         ondragover="event.preventDefault();this.classList.add('drag-over')"
         ondragleave="this.classList.remove('drag-over')"
         ondrop="handleDrop(event)">
      <div class="scan-icon">📇</div>
      <h3 data-i18n="scan_title">拍照或上傳名片</h3>
      <p data-i18n="scan_hint">點擊選擇圖片 · 或將圖片拖曳至此</p>
      <div id="img-preview" style="display:none; margin-top:1rem;">
        <img id="preview-img" class="card-img-preview">
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleFile(event)">

    <div id="status-bar" class="status-bar"></div>

    <!-- Result Card -->
    <div class="result-card" id="result-card" style="display:none;">
      <div class="result-card-header">
        <h3 data-i18n="result_title">辨識結果</h3>
        <span style="font-size:12px; color:var(--text3);" data-i18n="edit_hint">可直接編輯</span>
      </div>
      <div class="result-body">
        <div class="field-row"><div class="field-label" data-i18n="f_name">姓名</div><input class="field-input" id="f-name"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_title">職位</div><input class="field-input" id="f-title"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_company">公司</div><input class="field-input" id="f-company"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_email">Email</div><input class="field-input" id="f-email" type="email"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_phone">電話</div><input class="field-input" id="f-phone"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_address">地址</div><input class="field-input" id="f-address"></div>
        <div class="field-row"><div class="field-label" data-i18n="f_country">國家</div>
          <select class="field-input" id="f-country">
            <option value="">-- 選擇國家 --</option>
          </select>
        </div>
        <div class="field-row"><div class="field-label" data-i18n="f_notes">備註</div><textarea class="field-input" id="f-notes" rows="3"></textarea></div>
        <button class="save-btn" onclick="saveCard()" data-i18n="save_card">儲存名片</button>
      </div>
    </div>
  </div>

  <!-- BROWSE TAB -->
  <div id="tab-browse" class="main-content" style="display:none;">
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-num" id="stat-total">0</div><div class="stat-label" data-i18n="stat_total">總名片數</div></div>
      <div class="stat-pill"><div class="stat-num" id="stat-countries">0</div><div class="stat-label" data-i18n="stat_countries">國家數</div></div>
    </div>
    <div class="export-row">
      <button class="export-btn" onclick="exportCSV()" data-i18n="export_csv">📥 匯出 CSV</button>
      <button class="export-btn" onclick="exportJSON()" data-i18n="export_json">📥 匯出 JSON</button>
    </div>
    <div class="search-bar">
      <input class="search-input" id="search-input" placeholder="搜尋姓名、公司、Email…" oninput="renderBrowse()">
    </div>
    <div class="search-bar" style="margin-bottom:1rem;">
      <select class="search-select" style="flex:1;" id="continent-filter" onchange="updateCountryFilter()">
        <option value="">🌏 全部洲</option>
      </select>
      <select class="search-select" style="flex:1;" id="country-filter" onchange="renderBrowse()">
        <option value="">全部國家</option>
      </select>
    </div>
    <div id="browse-list"></div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="tab-settings" class="main-content" style="display:none;">
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_cards_count">名片數量</div>
      <div class="settings-item">
        <div class="settings-item-left">
          <div class="settings-item-label" id="settings-card-count">—</div>
        </div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_manage">資料管理</div>
      <div class="settings-item" onclick="exportCSV()" style="cursor:pointer;">
        <div class="settings-item-label" data-i18n="export_all">匯出全部名片</div>
        <div class="settings-item-right">CSV →</div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="settings_danger">危險區域</div>
      <button class="danger-btn" onclick="clearAllData()" data-i18n="clear_data">清除我的所有名片資料</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-company" id="modal-company"></div>
    <div id="modal-fields"></div>
    <button class="modal-close" onclick="closeModalBtn()" data-i18n="close">關閉</button>
  </div>
</div>

// Populate scan-tab country select (flat with optgroup by continent)
function populateCountrySelect() {
  const sel = document.getElementById('f-country');
  sel.innerHTML = `<option value="">${lang==='zh'?'-- 選擇國家 --':'-- Select Country --'}</option>`;
  CONTINENTS.forEach(cont => {
    const countries = COUNTRIES.filter(c => c.continent === cont.code);
    if (!countries.length) return;
    const grp = document.createElement('optgroup');
    grp.label = `${cont.flag} ${continentName(cont)}`;
    countries.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.code;
      opt.textContent = `${c.flag} ${c.zh} / ${c.en}`;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
}

// Populate browse filter — two cascading selects
function populateBrowseFilters(savedCont='', savedCtr='') {
  const contSel = document.getElementById('continent-filter');
  contSel.innerHTML = `<option value="">${lang==='zh'?'🌏 全部洲':'🌏 All Continents'}</option>`;
  CONTINENTS.forEach(cont => {
    const opt = document.createElement('option');
    opt.value = cont.code;
    opt.textContent = `${cont.flag} ${continentName(cont)}`;
    contSel.appendChild(opt);
  });
  if (savedCont) contSel.value = savedCont;
  updateCountryFilter(savedCtr);
}

function updateCountryFilter(savedCtr='') {
  const contCode = document.getElementById('continent-filter').value;
  const ctrSel = document.getElementById('country-filter');
  const prev = savedCtr || ctrSel.value;
  ctrSel.innerHTML = `<option value="">${lang==='zh'?'全部國家':'All Countries'}</option>`;
  const list = contCode ? COUNTRIES.filter(c=>c.continent===contCode) : COUNTRIES;
  list.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.code;
    opt.textContent = `${c.flag} ${countryName(c)}`;
    ctrSel.appendChild(opt);
  });
  if (prev && [...ctrSel.options].some(o=>o.value===prev)) ctrSel.value = prev;
  renderBrowse();
}

// FILE / CAMERA INPUT
// ══════════════════════════════════════════
let currentImageBase64 = null;
let currentImageType = 'image/jpeg';
function handleFile(e) { processFile(e.target.files[0]); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('scan-area').classList.remove('drag-over');
  processFile(e.dataTransfer.files[0]);
}
function processFile(file) {
  if (!file) return;
  currentImageType = 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      // Resize to max 1600px on longest side, compress to JPEG
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // Compress at 0.85 quality
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const b64 = dataUrl.split(',')[1];
      currentImageBase64 = b64;
      document.getElementById('preview-img').src = dataUrl;
      document.getElementById('img-preview').style.display = 'block';
      document.getElementById('result-card').style.display = 'none';
      scanWithAI(b64);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ══════════════════════════════════════════
// AI SCAN — Claude Vision
// ══════════════════════════════════════════
async function scanWithAI(b64) {
  const apiKey = getApiKey();
  if (!apiKey) { showStatus(t('no_api'), 'error'); return; }
  showStatus(`<span class="spinner"></span>${t('scanning')}`, 'loading');

  const prompt = `You are a business card OCR expert. Extract all information from this business card image and return ONLY a JSON object with these exact keys:
{"name":"","title":"","company":"","email":"","phone":"","address":"","country_code":""}

country_code must be one of: TW CN HK MO JP KR TH VN MY SG ID PH MM KH LA IN BD LK PK AE SA TR IL UZ KZ DE GB FR IT ES NL CH SE NO DK FI PL CZ AT BE PT RU UA RS HR SK HU RO GR US CA MX BR AR CL CO PE ZA NG EG KE ET GH AU NZ OTHER
Infer country from address, phone prefix, or language. If unsure use OTHER.
Return ONLY valid JSON, no explanation, no markdown.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageType, data: b64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content[0].text.trim();
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    populateResult(json);
    showStatus('', 'hidden');
  } catch(err) {
    showStatus(t('save_failed') + (err.message ? ': ' + err.message : ''), 'error');
  }
}

function populateResult(d) {
  document.getElementById('f-name').value = d.name || '';
  document.getElementById('f-title').value = d.title || '';
  document.getElementById('f-company').value = d.company || '';
  document.getElementById('f-email').value = d.email || '';
  document.getElementById('f-phone').value = d.phone || '';
  document.getElementById('f-address').value = d.address || '';
  document.getElementById('f-country').value = d.country_code || '';
  document.getElementById('f-notes').value = '';
  document.getElementById('result-card').style.display = 'block';
  document.getElementById('result-card').scrollIntoView({behavior:'smooth'});
}

function saveCard() {
  const card = {
    id: Date.now().toString(),
    name: document.getElementById('f-name').value,
    title: document.getElementById('f-title').value,
    company: document.getElementById('f-company').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value,
    address: document.getElementById('f-address').value,
    country: document.getElementById('f-country').value || 'OTHER',
    notes: document.getElementById('f-notes').value,
    savedAt: new Date().toISOString(),
    image: currentImageBase64 || null,
  };
  const cards = getCards();
  cards.unshift(card);
  saveCards(cards);
  showStatus(t('saved'), 'success');
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('img-preview').style.display = 'none';
  currentImageBase64 = null;
  document.getElementById('file-input').value = '';
  updateSettingsCount();
}

  el.innerHTML = msg;
  el.className = 'status-bar ' + (type === 'hidden' ? '' : type);
  el.style.display = type === 'hidden' ? 'none' : 'block';
}

// ══════════════════════════════════════════
// BROWSE + SEARCH
// ══════════════════════════════════════════
function renderBrowse() {
  const cards = getCards();
  const q = document.getElementById('search-input').value.toLowerCase();
  const contF = document.getElementById('continent-filter').value;
  const cf = document.getElementById('country-filter').value;

  let filtered = cards.filter(c => {
    const match = !q || [c.name,c.company,c.email,c.phone,c.title].join(' ').toLowerCase().includes(q);
    const ctry = countryByCode(c.country||'OTHER');
    const contMatch = !contF || ctry.continent === contF;
    const cMatch = !cf || c.country === cf;
    return match && contMatch && cMatch;
  });

  // Group by continent → country
  const byContinent = {};
  filtered.forEach(c => {
    const ctry = countryByCode(c.country||'OTHER');
    const cont = ctry.continent || 'OTHER';
    if (!byContinent[cont]) byContinent[cont] = {};
    if (!byContinent[cont][ctry.code]) byContinent[cont][ctry.code] = [];
    byContinent[cont][ctry.code].push(c);
  });

  const allCards = getCards();
  document.getElementById('stat-total').textContent = allCards.length;
  const uniqueCountries = [...new Set(allCards.map(c=>c.country||'OTHER'))].length;
  document.getElementById('stat-countries').textContent = uniqueCountries;

  const container = document.getElementById('browse-list');
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div style="font-size:3rem;">📇</div><p>${t('empty')}</p></div>`;
    return;
  }

  container.innerHTML = '';
  const contOrder = CONTINENTS.map(c=>c.code);
  const sortedConts = Object.keys(byContinent).sort((a,b) => contOrder.indexOf(a)-contOrder.indexOf(b));

  sortedConts.forEach(contCode => {
    const contObj = CONTINENTS.find(c=>c.code===contCode) || {flag:'🌐',zh:'其他',en:'Other'};
    // Continent header
    const contDiv = document.createElement('div');
    contDiv.style.cssText = 'margin-bottom:1.5rem;';
    const contHeader = document.createElement('div');
    contHeader.style.cssText = 'font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.75rem;display:flex;align-items:center;gap:6px;';
    contHeader.innerHTML = `<span>${contObj.flag}</span><span>${continentName(contObj)}</span>`;
    contDiv.appendChild(contHeader);

    const countryGroups = byContinent[contCode];
    const countryOrder = COUNTRIES.filter(c=>c.continent===contCode).map(c=>c.code);
    const sortedCtrs = Object.keys(countryGroups).sort((a,b) => countryOrder.indexOf(a)-countryOrder.indexOf(b));

    sortedCtrs.forEach(code => {
      const ctry = countryByCode(code);
      const grp = document.createElement('div');
      grp.className = 'country-group';
      grp.innerHTML = `
        <div class="country-header">
          <span class="country-flag">${ctry.flag}</span>
          <span class="country-name">${countryName(ctry)}</span>
          <span class="country-count">${countryGroups[code].length} ${lang==='zh'?'張':'cards'}</span>
        </div>
        <div class="cards-grid" id="grp-${code}"></div>`;
      contDiv.appendChild(grp);
      const grid = grp.querySelector('.cards-grid');
      countryGroups[code].forEach(card => {
        const el = document.createElement('div');
        el.className = 'contact-card';
        el.innerHTML = `
          <div class="contact-card-name">${esc(card.name)||'—'}</div>
          <div class="contact-card-title">${esc(card.title)||''}</div>
          <div class="contact-card-company">${esc(card.company)||''}</div>
          <div class="contact-card-meta">
            ${card.email?`<span class="contact-meta-item">✉ ${esc(card.email)}</span>`:''}
            ${card.phone?`<span class="contact-meta-item">📞 ${esc(card.phone)}</span>`:''}
          </div>
          <div class="contact-card-actions">
            <button class="action-btn" onclick="openModal('${card.id}')">${lang==='zh'?'詳細':'Detail'}</button>
            <button class="action-btn del" onclick="deleteCard('${card.id}',event)">${lang==='zh'?'刪除':'Delete'}</button>
          </div>`;
        grid.appendChild(el);
      });
    });
    container.appendChild(contDiv);
  });
}
function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function deleteCard(id, e) {
  e.stopPropagation();
  if (!confirm(t('confirm_delete'))) return;
  const cards = getCards().filter(c=>c.id!==id);
  saveCards(cards);
  renderBrowse();
  updateSettingsCount();
}

// ══════════════════════════════════════════
// DETAIL MODAL
// ══════════════════════════════════════════
function openModal(id) {
  const card = getCards().find(c=>c.id===id);
  if (!card) return;
  document.getElementById('modal-name').textContent = card.name||'—';
  document.getElementById('modal-title').textContent = card.title||'';
  document.getElementById('modal-company').textContent = card.company||'';
  const ctry = countryByCode(card.country||'OTHER');
  const fields = [
    {icon:'✉',label:'Email',val:card.email},
    {icon:'📞',label:t('f_phone'),val:card.phone},
    {icon:'📍',label:t('f_address'),val:card.address},
    {icon:ctry.flag,label:t('f_country'),val:countryName(ctry)},
    {icon:'🕐',label:'Saved',val:card.savedAt?new Date(card.savedAt).toLocaleDateString():''},
  ];
  let html = '';
  fields.forEach(f => {
    if (!f.val) return;
    html += `<div class="modal-field">
      <div class="modal-field-icon">${f.icon}</div>
      <div class="modal-field-content">
        <div class="modal-field-label">${f.label}</div>
        <div class="modal-field-value">${esc(f.val)}</div>
      </div></div>`;
  });
  if (card.notes) {
    html += `<div class="modal-field">
      <div class="modal-field-icon">📝</div>
      <div class="modal-field-content">
        <div class="modal-field-label">${t('f_notes')}</div>
        <div class="modal-notes-box">${esc(card.notes)}</div>
      </div></div>`;
  }
  document.getElementById('modal-fields').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if(e.target===document.getElementById('modal-overlay')) closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal-overlay').classList.remove('open'); }

// ══════════════════════════════════════════
// TAB SWITCH
// ══════════════════════════════════════════
function switchTab(tab) {
  ['scan','browse','settings'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===tab?'block':'none';
    document.getElementById(`tab-${t}-btn`).classList.toggle('active', t===tab);
  });
  if (tab==='browse') renderBrowse();
  if (tab==='settings') updateSettingsCount();
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function updateSettingsCount() {
  const el = document.getElementById('settings-card-count');
  if (el) el.textContent = getCards().length + (lang==='zh'?' 張':'  cards');
}
function clearAllData() {
  if (!confirm(t('confirm_clear'))) return;
  saveCards([]);
  renderBrowse();
  updateSettingsCount();
}

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportCSV() {
  const cards = getCards();
  const cols = ['name','title','company','email','phone','address','country','notes','savedAt'];
  const header = 'Name,Title,Company,Email,Phone,Address,Country,Notes,Saved At\n';
  const rows = cards.map(c => cols.map(k=>`"${(c[k]||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadFile('cardvault_export.csv', header+rows, 'text/csv');
}
function exportJSON() {
  const cards = getCards().map(({image,...rest})=>rest);
  downloadFile('cardvault_export.json', JSON.stringify(cards,null,2), 'application/json');
}
function downloadFile(name, content, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}
</script>
</body>
</html>
