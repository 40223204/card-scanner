<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Scanner">
<title>Business Card Scanner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang TC', sans-serif;
    background: #0F0F13; color: #F0F0F5;
    min-height: 100vh; padding-bottom: 60px;
  }
  .header {
    background: #0F0F13; padding: 52px 20px 14px;
    border-bottom: 0.5px solid #1E1E28;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .header-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-text p  { font-size: 13px; color: #666680; margin-top: 3px; }
  .lang-switcher { display: flex; gap: 6px; }
  .lang-btn {
    padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
    border: 0.5px solid #2A2A3A; background: transparent; color: #666680;
    cursor: pointer; font-family: inherit; transition: all .15s;
  }
  .lang-btn.active { background: #1E1B4B; border-color: #6366F1; color: #A5B4FC; }
  .section {
    margin: 14px 16px 0; background: #17171F;
    border-radius: 16px; border: 0.5px solid #1E1E2E; overflow: hidden;
  }
  .sec-label {
    padding: 14px 16px 0; font-size: 11px; font-weight: 600;
    color: #5A5A80; letter-spacing: .08em; text-transform: uppercase;
  }
  .sec-body { padding: 12px 16px 16px; }
  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; background: #0F0F13; border: 0.5px solid #2A2A3A;
    border-radius: 10px; padding: 11px 13px; font-size: 15px; color: #F0F0F5;
    font-family: inherit; -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: #6366F1; }
  .field textarea { resize: none; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .row2 .field { margin-bottom: 0; }
  .token-wrap { display: flex; gap: 8px; }
  .token-wrap input { flex: 1; }
  .btn-ghost {
    background: #1E1E2E; border: 0.5px solid #2A2A3A; border-radius: 10px;
    color: #888; font-size: 13px; padding: 0 14px; cursor: pointer;
    white-space: nowrap; font-family: inherit;
  }
  .upload-zone {
    border: 1.5px dashed #2A2A3A; border-radius: 14px; padding: 28px 20px;
    text-align: center; cursor: pointer; display: block;
    transition: background .15s; position: relative;
  }
  .upload-zone:active { background: #1E1E2E; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone p   { font-size: 14px; color: #666680; }
  .upload-zone small { font-size: 12px; color: #444460; margin-top: 4px; display: block; }
  #preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 10px; margin-top: 12px; display: none; }
  .country-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .cpill {
    padding: 7px 14px; border-radius: 20px; font-size: 13px;
    border: 0.5px solid #2A2A3A; background: #0F0F13; cursor: pointer;
    color: #AAAACC; font-family: inherit; transition: all .15s;
  }
  .cpill.active { border-color: #6366F1; background: #1E1B4B; color: #A5B4FC; }
  .db-hint { font-size: 11px; color: #5A5A80; margin-top: 8px; font-family: monospace; display: none; }
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 15px; border-radius: 14px; font-size: 16px;
    font-weight: 600; cursor: pointer; border: none; font-family: inherit;
    transition: all .15s; -webkit-appearance: none;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: #6366F1; color: #fff; }
  .btn-primary:disabled { background: #2A2A4A; color: #5A5A80; cursor: not-allowed; transform: none; }
  .btn-save { background: #059669; color: #fff; }
  .btn-save:disabled { background: #1A3A2A; color: #3A7A5A; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #1E1E2E; color: #AAAACC; border: 0.5px solid #2A2A3A; }
  .btn-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
  .btn-small { width: auto; padding: 15px 20px; }
  .status {
    border-radius: 10px; padding: 11px 14px; font-size: 14px;
    margin-top: 10px; display: none; line-height: 1.4;
  }
  .status.show { display: block; }
  .status.ok   { background: #052E1A; color: #34D399; border: 0.5px solid #064E2A; }
  .status.err  { background: #2E0505; color: #F87171; border: 0.5px solid #4E0606; }
  .status.info { background: #050D2E; color: #93C5FD; border: 0.5px solid #062050; }
  .spinner {
    width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.2);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block; flex-shrink: 0;
  }
  .spinner.green { border-color: rgba(52,211,153,.2); border-top-color: #34D399; }
  @keyframes spin { to { transform: rotate(360deg); } }
  hr { border: none; border-top: 0.5px solid #1E1E2E; margin: 14px 0; }
  .settings-toggle {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; cursor: pointer;
  }
  .settings-toggle span { font-size: 14px; color: #AAAACC; }
  .settings-toggle .arrow { font-size: 12px; color: #5A5A80; transition: transform .2s; }
  .settings-toggle .arrow.open { transform: rotate(180deg); }
  .settings-body { padding: 0 16px 16px; }
  .settings-body.hidden { display: none; }
  .conn-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  .conn-st { font-size: 13px; color: #666680; }
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: #059669; color: #fff; padding: 14px 28px; border-radius: 14px;
    font-size: 15px; font-weight: 600; z-index: 999;
    opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-text">
    <h1 id="h-title">Business Card Scanner</h1>
    <p id="h-sub">Photo → AI Scan → Save to Notion</p>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('zh')">繁中</button>
    <button class="lang-btn" onclick="setLang('tr')">TR</button>
  </div>
</div>

<div class="section">
  <div class="settings-toggle" onclick="toggleSettings()">
    <span id="lbl-settings">⚙️ &nbsp;Notion Settings</span>
    <span class="arrow" id="arrow">▼</span>
  </div>
  <div class="settings-body" id="settings-body">
    <div class="field">
      <label id="lbl-token">Integration Token</label>
      <div class="token-wrap">
        <input type="password" id="token" placeholder="ntn_xxxxxxxxxxxx" />
        <button class="btn-ghost" id="btn-showtok" onclick="toggleTok()">Show</button>
      </div>
    </div>
    <div class="field">
      <label id="lbl-worker">Worker URL</label>
      <input type="text" id="proxy" value="https://notion-proxy.shaucici0910.workers.dev" />
    </div>
    <div class="conn-row">
      <button class="btn-ghost" style="padding:9px 16px;font-size:14px" id="btn-test" onclick="testConn()">Test Connection</button>
      <span class="conn-st" id="conn-st"></span>
    </div>
  </div>
</div>

<div class="section" style="margin-top:16px">
  <div class="sec-label" id="lbl-scan-sec">Scan Card</div>
  <div class="sec-body">
    <label class="upload-zone">
      <input type="file" accept="image/*" capture="environment" id="file-input" onchange="onFile(this)" />
      <div class="icon" id="zone-icon">📷</div>
      <p id="zone-text">Tap to take photo or upload image</p>
      <small id="zone-sub">JPG, PNG, HEIC supported</small>
      <img id="preview-img" />
    </label>
    <div style="margin-top:12px" class="btn-row">
      <button class="btn btn-primary" id="scan-btn" onclick="scanCard()" disabled>
        <span id="scan-lbl">AI Scan Card</span>
      </button>
      <button class="btn btn-secondary btn-small" id="btn-clear" onclick="clearAll()">Clear</button>
    </div>
    <div class="status" id="scan-st"></div>
  </div>
</div>

<div class="section" id="result-sec" style="display:none;margin-top:16px">
  <div class="sec-label" id="lbl-result-sec">Scan Result</div>
  <div class="sec-body">
    <div class="row2">
      <div class="field"><label id="lbl-name">Name</label><input type="text" id="f-name" /></div>
      <div class="field"><label id="lbl-titlef">Title</label><input type="text" id="f-title" /></div>
    </div>
    <div class="row2">
      <div class="field"><label id="lbl-company">Company</label><input type="text" id="f-company" /></div>
      <div class="field"><label id="lbl-phone">Phone</label><input type="tel" id="f-phone" /></div>
    </div>
    <div class="field"><label>Email</label><input type="email" id="f-email" /></div>
    <div class="field">
      <label id="lbl-notes">Notes</label>
      <textarea id="f-notes" rows="3"></textarea>
    </div>
    <hr>
    <div class="field">
      <label id="lbl-country">Country — Auto-route to Notion Database</label>
      <div class="country-row">
        <button class="cpill" data-c="Malaysia" onclick="pickC('Malaysia')">🇲🇾 Malaysia</button>
        <button class="cpill" data-c="Thailand" onclick="pickC('Thailand')">🇹🇭 Thailand</button>
        <button class="cpill" data-c="Vietnam"  onclick="pickC('Vietnam')">🇻🇳 Vietnam</button>
        <button class="cpill" data-c="Others"   onclick="pickC('Others')">🌐 Others</button>
      </div>
      <div class="db-hint" id="db-hint"></div>
    </div>
    <hr>
    <button class="btn btn-save" id="save-btn" onclick="saveNotion()">
      <span id="save-lbl">Save to Notion</span>
    </button>
    <div class="status" id="save-st"></div>
  </div>
</div>

<div class="toast" id="toast">✓ Saved to Notion!</div>

<script>
const I18N = {
  en: {
    title:"Business Card Scanner", sub:"Photo → AI Scan → Save to Notion",
    settings:"⚙️  Notion Settings", token:"Integration Token", worker:"Worker URL",
    testBtn:"Test Connection", scanSec:"Scan Card",
    zoneText:"Tap to take photo or upload image", zoneSub:"JPG, PNG, HEIC supported",
    scanBtn:"AI Scan Card", clear:"Clear", resultSec:"Scan Result",
    name:"Name", titlef:"Title", company:"Company", phone:"Phone", notes:"Notes",
    country:"Country — Auto-route to Notion Database", saveBtn:"Save to Notion",
    showTok:"Show", hideTok:"Hide", toast:"✓ Saved to Notion!",
    scanning:"AI scanning card...", scanOk:"✓ Scan complete! Please confirm details.",
    scanErr:"Scan failed: ", noToken:"Please enter Notion Token",
    noCountry:"Please select a country", testing:"Testing...",
    connOk:"✓ Connected", connFail:"✗ Cannot connect",
    notesPH:"Where you met, follow-up notes, website...",
  },
  zh: {
    title:"名片掃描", sub:"拍照 → AI 辨識 → 存入 Notion",
    settings:"⚙️  Notion 設定", token:"Integration Token", worker:"Worker URL",
    testBtn:"測試連線", scanSec:"掃描名片",
    zoneText:"點擊拍照或選取名片圖片", zoneSub:"支援 JPG、PNG、HEIC",
    scanBtn:"AI 辨識名片", clear:"清除", resultSec:"辨識結果",
    name:"姓名", titlef:"職稱", company:"公司", phone:"電話", notes:"備註",
    country:"國家 — 自動存入對應 Notion Database", saveBtn:"存入 Notion",
    showTok:"顯示", hideTok:"隱藏", toast:"✓ 已成功存入 Notion！",
    scanning:"AI 正在讀取名片...", scanOk:"✓ 辨識完成！請確認資料後存入 Notion",
    scanErr:"辨識失敗：", noToken:"請填入 Notion Token",
    noCountry:"請選擇國家", testing:"測試中...",
    connOk:"✓ 連線正常", connFail:"✗ 無法連線",
    notesPH:"認識場合、跟進事項、網站...",
  },
  tr: {
    title:"Kartvizit Tarayıcı", sub:"Fotoğraf → AI Tarama → Notion'a Kaydet",
    settings:"⚙️  Notion Ayarları", token:"Entegrasyon Tokeni", worker:"Worker URL",
    testBtn:"Bağlantıyı Test Et", scanSec:"Kartvizit Tara",
    zoneText:"Fotoğraf çekmek veya resim yüklemek için dokunun", zoneSub:"JPG, PNG, HEIC desteklenir",
    scanBtn:"AI ile Tara", clear:"Temizle", resultSec:"Tarama Sonucu",
    name:"Ad Soyad", titlef:"Ünvan", company:"Şirket", phone:"Telefon", notes:"Notlar",
    country:"Ülke — Notion Veritabanına Yönlendir", saveBtn:"Notion'a Kaydet",
    showTok:"Göster", hideTok:"Gizle", toast:"✓ Notion'a kaydedildi!",
    scanning:"AI kartviziti okuyor...", scanOk:"✓ Tarama tamamlandı! Bilgileri onaylayın.",
    scanErr:"Tarama başarısız: ", noToken:"Lütfen Notion Token girin",
    noCountry:"Lütfen ülke seçin", testing:"Test ediliyor...",
    connOk:"✓ Bağlantı başarılı", connFail:"✗ Bağlantı kurulamıyor",
    notesPH:"Tanışma yeri, takip notları, web sitesi...",
  }
};

const DBS = {
  Malaysia:"345c06889e29801aadcdff21dffb0e04",
  Thailand:"345c06889e2980a6b8ccd188d753896f",
  Vietnam:"345c06889e2980b4b297e4952bc1838d",
  Others:"345c06889e2980ef860cfa0d55fe587a"
};

let lang='en', imgB64=null, imgType="image/jpeg", country=null;
const t = k => I18N[lang][k] || I18N.en[k] || k;

function applyLang() {
  document.getElementById('h-title').textContent        = t('title');
  document.getElementById('h-sub').textContent          = t('sub');
  document.getElementById('lbl-settings').textContent   = t('settings');
  document.getElementById('lbl-token').textContent      = t('token');
  document.getElementById('lbl-worker').textContent     = t('worker');
  document.getElementById('btn-test').textContent       = t('testBtn');
  document.getElementById('lbl-scan-sec').textContent   = t('scanSec');
  document.getElementById('zone-text').textContent      = t('zoneText');
  document.getElementById('zone-sub').textContent       = t('zoneSub');
  document.getElementById('scan-lbl').textContent       = t('scanBtn');
  document.getElementById('btn-clear').textContent      = t('clear');
  document.getElementById('lbl-result-sec').textContent = t('resultSec');
  document.getElementById('lbl-name').textContent       = t('name');
  document.getElementById('lbl-titlef').textContent     = t('titlef');
  document.getElementById('lbl-company').textContent    = t('company');
  document.getElementById('lbl-phone').textContent      = t('phone');
  document.getElementById('lbl-notes').textContent      = t('notes');
  document.getElementById('lbl-country').textContent    = t('country');
  document.getElementById('save-lbl').textContent       = t('saveBtn');
  document.getElementById('btn-showtok').textContent    = t('showTok');
  document.getElementById('f-notes').placeholder        = t('notesPH');
  document.getElementById('toast').textContent          = t('toast');
  document.querySelectorAll('.lang-btn').forEach(b => {
    const map = {en:'EN', zh:'繁中', tr:'TR'};
    b.classList.toggle('active', b.textContent === map[lang]);
  });
}

function setLang(l) {
  lang = l; localStorage.setItem('lang', l); applyLang();
}

window.addEventListener('load', () => {
  lang = localStorage.getItem('lang') || 'en';
  applyLang();
  const tok = localStorage.getItem('notion_token');
  const prx = localStorage.getItem('proxy_url');
  if (tok) { document.getElementById('token').value = tok; toggleSettings(); }
  if (prx) document.getElementById('proxy').value = prx;
});
document.getElementById('token').addEventListener('blur', e => localStorage.setItem('notion_token', e.target.value));
document.getElementById('proxy').addEventListener('blur', e => localStorage.setItem('proxy_url', e.target.value));

function toggleSettings() {
  document.getElementById('settings-body').classList.toggle('hidden');
  document.getElementById('arrow').classList.toggle('open');
}
function toggleTok() {
  const el = document.getElementById('token');
  el.type = el.type==='password' ? 'text' : 'password';
  document.getElementById('btn-showtok').textContent = el.type==='password' ? t('showTok') : t('hideTok');
}
async function testConn() {
  const proxy = document.getElementById('proxy').value.trim();
  const st = document.getElementById('conn-st');
  st.textContent = t('testing'); st.style.color = '#666680';
  try {
    const r = await fetch(proxy, {method:'GET'});
    const d = await r.json();
    if (d.error === 'Method not allowed') { st.textContent = t('connOk'); st.style.color = '#34D399'; }
    else { st.textContent = '⚠ Unexpected'; st.style.color = '#FBBF24'; }
  } catch { st.textContent = t('connFail'); st.style.color = '#F87171'; }
}

function onFile(input) {
  const file = input.files[0]; if (!file) return;
  imgType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    const img = document.getElementById('preview-img');
    img.src = e.target.result; img.style.display = 'block';
    document.getElementById('zone-icon').style.display = 'none';
    document.getElementById('zone-text').style.display = 'none';
    document.getElementById('zone-sub').style.display = 'none';
    document.getElementById('scan-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

function clearAll() {
  imgB64=null; country=null;
  document.getElementById('file-input').value='';
  document.getElementById('preview-img').style.display='none';
  document.getElementById('zone-icon').style.display='block';
  document.getElementById('zone-text').style.display='block';
  document.getElementById('zone-sub').style.display='block';
  document.getElementById('scan-btn').disabled=true;
  document.getElementById('result-sec').style.display='none';
  ['f-name','f-title','f-company','f-phone','f-email','f-notes'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.cpill').forEach(b=>b.classList.remove('active'));
  document.getElementById('db-hint').style.display='none';
  showSt('scan-st','',''); showSt('save-st','','');
}

function pickC(c) {
  country=c;
  document.querySelectorAll('.cpill').forEach(b=>b.classList.toggle('active', b.dataset.c===c));
  const h=document.getElementById('db-hint');
  h.textContent='→ '+c+': '+DBS[c]; h.style.display='block';
}

function showSt(id, msg, type) {
  const el=document.getElementById(id);
  el.textContent=msg;
  el.className='status'+(type?' show '+type:'');
}

async function scanCard() {
  if (!imgB64) return;
  const proxy = document.getElementById('proxy').value.trim();
  const btn = document.getElementById('scan-btn');
  btn.disabled=true;
  document.getElementById('scan-lbl').innerHTML='<span class="spinner"></span>';
  showSt('scan-st', t('scanning'), 'info');
  try {
    const res = await fetch(proxy, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'scan', image_base64:imgB64, image_type:imgType})
    });
    const d = await res.json();
    if (!d.ok) throw new Error(d.error||'error');
    const p = d.data;
    document.getElementById('f-name').value    = p.name    || '';
    document.getElementById('f-title').value   = p.title   || '';
    document.getElementById('f-company').value = p.company || '';
    document.getElementById('f-phone').value   = p.phone   || '';
    document.getElementById('f-email').value   = p.email   || '';
    document.getElementById('f-notes').value   = p.notes   || '';
    if (p.country && DBS[p.country]) pickC(p.country);
    document.getElementById('result-sec').style.display='block';
    document.getElementById('result-sec').scrollIntoView({behavior:'smooth'});
    showSt('scan-st', t('scanOk'), 'ok');
  } catch(e) {
    showSt('scan-st', t('scanErr')+e.message, 'err');
  } finally {
    btn.disabled=false;
    document.getElementById('scan-lbl').textContent=t('scanBtn');
  }
}

async function saveNotion() {
  const token = document.getElementById('token').value.trim();
  const proxy = document.getElementById('proxy').value.trim();
  if (!token)   { showSt('save-st', t('noToken'),   'err'); return; }
  if (!country) { showSt('save-st', t('noCountry'), 'err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled=true;
  document.getElementById('save-lbl').innerHTML='<span class="spinner green"></span>';
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const props = {
    "Name":         {title:    [{text:{content: document.getElementById('f-name').value.trim()||'—'}}]},
    "Company":      {rich_text:[{text:{content: document.getElementById('f-company').value.trim()}}]},
    "Country":      {select:   {name: country}},
    "Notes":        {rich_text:[{text:{content: document.getElementById('f-notes').value.trim()}}]},
    "Scanned Date": {date:     {start: new Date().toISOString().split('T')[0]}}
  };
  if (email) props["Email"] = {email};
  if (phone) props["Phone"] = {phone_number: phone};
  try {
    const res = await fetch(proxy, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({action:'save', notion_token:token, database_id:DBS[country], properties:props})
    });
    const d = await res.json();
    if (d.ok) {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 3000);
      setTimeout(clearAll, 2000);
    } else {
      showSt('save-st', d.error||JSON.stringify(d), 'err');
    }
  } catch(e) {
    showSt('save-st', e.message, 'err');
  } finally {
    btn.disabled=false;
    document.getElementById('save-lbl').textContent=t('saveBtn');
  }
}
</script>
</body>
</html>
